# =============================================================================
# config.example.yaml — 配置模板
# 使用方法: 复制本文件为 config.yaml，按需填写后运行程序
#   cp config.example.yaml config.yaml
# =============================================================================

# ── 浏览器引擎 ─────────────────────────────────────────────────────────────
# playwright : Chromium，速度快，注入 stealth JS 反检测
# camoufox   : 基于 Firefox 的指纹混淆引擎，反检测更强（推荐生产环境）
engine: playwright

# 最大同时运行的浏览器实例数量（建议不超过 CPU 核心数）
max_concurrent: 2

# ── 邮件服务 ───────────────────────────────────────────────────────────────
# 选择一个邮件服务来接收 ChatGPT 验证码
# 可选值: gptmail | npcmail | yydsmail | imap
#
# imap  — 使用你自己的真实邮箱（Gmail / QQ 等）通过 IMAP 协议收信
#         - qq.com / gmail.com 域名自动启用 "+别名" 模式
#           （每次注册生成唯一别名地址，如 user+abc123@gmail.com）
#           所有别名邮件仍投递到同一收件箱，poll_code 会按 To: 头部区分
#         - 支持配置多个账户（列表格式），多账户时随机选取一个
mail_provider: gptmail

mail:
  # GPTMail — https://mail.chatgpt.org.uk
  # 公共 key "gpt-test" 可免费使用，但有严格频率限制
  # 大批量注册请申请付费 key
  gptmail:
    api_key: "gpt-test"
    base_url: "https://mail.chatgpt.org.uk"

  # NPCmail — https://dash.xphdfs.me
  # 需要注册账号后在控制台获取 API Key
  npcmail:
    api_key: ""
    base_url: "https://dash.xphdfs.me"

  # YYDS Mail — https://maliapi.215.im
  # 需要注册账号后在控制台获取 API Key
  yydsmail:
    api_key: ""
    base_url: "https://maliapi.215.im/v1"

  # IMAP — 使用自有真实邮箱收信（支持多账户）
  # ┌─ Gmail 示例 ────────────────────────────────────────────────────────────
  # │  1. 前往 Google 账户 → 安全性 → 应用专用密码，生成一个 16 位密码
  # │  2. Gmail 需在设置中启用 IMAP（设置 → 转发和 POP/IMAP → 启用 IMAP）
  # │  3. qq.com / gmail.com 自动启用 "+别名" 模式，无需额外配置
  # └─────────────────────────────────────────────────────────────────────────
  # ┌─ QQ 邮箱示例 ───────────────────────────────────────────────────────────
  # │  1. QQ 邮箱 → 设置 → 账户 → 开启 IMAP 服务，获取授权码（非登录密码）
  # │  2. host: imap.qq.com  port: 993  ssl: true
  # └─────────────────────────────────────────────────────────────────────────
  imap:
    - email:    "user@gmail.com"     # 你的完整邮箱地址
      password: "abcd efgh ijkl mnop"  # Gmail 应用专用密码（16 位，含空格也可）
      host:     "imap.gmail.com"
      port:     993                  # 993=IMAPS(SSL) | 143=STARTTLS
      ssl:      true
      folder:   INBOX
      # use_alias: true              # 不填 → qq.com/gmail.com 自动启用别名模式
    # 第二个账户示例（可选，多账户随机轮换）:
    # - email:    "myqq@qq.com"
    #   password: "xxxxxxxxxxxxxx"   # QQ 邮箱授权码
    #   host:     "imap.qq.com"
    #   port:     993
    #   ssl:      true
    #   folder:   INBOX

# ── 邮箱生成规则 ───────────────────────────────────────────────────────────
registration:
  # 邮箱用户名前缀，留空则由程序随机生成 12 位字符串
  prefix: ""
  # 邮箱域名，留空则由邮件服务自动分配
  # 填写示例: "example.com"（需要邮件服务支持自定义域名）
  domain: ""

# ── 代理设置 ───────────────────────────────────────────────────────────────
# proxy_strategy 决定代理来源，优先级：
#   --proxy CLI 参数  >  static（配置文件固定代理）  >  pool（数据库轮询）  >  none
#
# 可选值:
#   none   — 不使用代理，直连
#   static — 使用下方 proxy_static 指定的固定代理
#   pool   — 从数据库代理池中轮询分配（使用 import-proxies 命令导入代理）
proxy_strategy: none

# 固定代理 URL（proxy_strategy=static 时生效）
# 支持格式:
#   http://host:port
#   http://user:pass@host:port
#   socks5://user:pass@host:port
proxy_static: ""

# ── 团队账号同步（预留，暂未实现）────────────────────────────────────────
team:
  url: ""   # 团队 API 地址
  key: ""   # 团队 API Key

sync:
  url: ""   # 同步服务地址
  key: ""   # 同步服务 Key

